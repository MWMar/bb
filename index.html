<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Wiatrówki</title>

  <!-- RESPONSYWNOŚĆ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* KONTENER (scroll jak aplikacja) */
    .table-container {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      border-collapse: collapse;
      width: 100%;
         }

    td, th {
      border: 1px solid #ccc;
      padding: 8px;
      font-size: clamp(14px, 4vw, 18px); /* dopasowuje się do szerokości ekranu */
      white-space: normal;
    }
    .nw {
      white-space: normal;
    }
    th {
      position: sticky;
      top: 0;
      background: #f5f5f5;
      z-index: 2;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

    tr:hover {
      background: #f0f0f0;
    }

    /* MINIATURKI */
    td.images {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    img.thumb {
      width: clamp(40px, 10vw, 80px);
      height: clamp(40px, 10vw, 80px);
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s;
     }

    img.thumb:hover {
      transform: scale(1.1);
    }

    /* LIGHTBOX */
    #lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
    }

    #lightbox .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Tabela</h1>

<div class="table-container">
  <table id="tabela"></table>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <span class="close">✖</span>
  <img id="lightboxImg">
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZO3-GUWNEOAn87B-zEbtVy0SAuj3HTHHz6YOH_EwA6G0s-jkKaMRv9WAQLaTcM0dQBkANW4x3lv1l/pub?gid=94570365&single=true&output=csv";

/* LIGHTBOX */
function openLightbox(src) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

/* POBIERANIE DANYCH */
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.trim().split("\n").map(r => r.split(","));
    const table = document.getElementById("tabela");

    rows.forEach((row, i) => {
      const tr = document.createElement("tr");

      row.forEach(cell => {
        const td = document.createElement(i === 0 ? "th" : "td");
        td.textContent = cell;
        tr.appendChild(td);
      });

      /* KOLUMNA ZE ZDJĘCIAMI */
      if (i !== 0) {
        const index = row[0].trim();
        const td = document.createElement("td");
        td.className = "images";

        const letters = ["", "a", "b", "c", "d", "e"];

        letters.forEach(l => {
          const imgPath = `images/${index}${l}.jpg`;

          const img = new Image();
          img.src = imgPath;
          img.className = "thumb";

          img.onerror = () => img.remove();

          img.onclick = () => openLightbox(img.src);

          td.appendChild(img);
        });

        tr.appendChild(td);
      }

      table.appendChild(tr);
    });
  });
</script>

</body>
</html>
